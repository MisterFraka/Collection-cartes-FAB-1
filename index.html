<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Flesh and Blood</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #16082f, #050505);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.progress-box {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 20px;
}

.progress-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

.progress-text {
  margin-bottom: 10px;
}

.progress-bar {
  width: 100%;
  height: 18px;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff7b7b, #ffd36b);
  border-radius: 999px;
  transition: width 0.3s ease;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  display: block;
}

.card-body {
  padding: 10px;
}

.badge {
  background: rgba(255,255,255,0.2);
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  margin: 2px;
  display: inline-block;
}

@media (max-width: 800px) {
  .controls {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>🃏 Collection Flesh and Blood</h1>
</header>

<div class="container">

  <div class="controls">
    <input id="search" placeholder="Rechercher une carte">
    <select id="set"></select>
    <select id="rarity"></select>
    <select id="owned">
      <option value="all">Toutes</option>
      <option value="owned">Possédées</option>
      <option value="missing">Manquantes</option>
    </select>
  </div>

  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Progression de l’extension</div>
    <div class="progress-text" id="progressText">Choisis une extension</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div id="cards" class="cards"></div>

</div>

<script>
let rawData = [];
let allEditions = [];
let owned = JSON.parse(localStorage.getItem("owned") || "{}");

const searchInput = document.getElementById("search");
const setSelect = document.getElementById("set");
const raritySelect = document.getElementById("rarity");
const ownedSelect = document.getElementById("owned");
const cardsDiv = document.getElementById("cards");

const progressTitle = document.getElementById("progressTitle");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");

function flatten(data) {
  const arr = [];
  data.forEach(card => {
    card.editions.forEach(e => {
      arr.push({
        name: card.name,
        pitch: card.pitch,
        ...e
      });
    });
  });
  return arr;
}

function save() {
  localStorage.setItem("owned", JSON.stringify(owned));
}

function populateFilters() {
  const sets = [...new Set(allEditions.map(e => e.set_name))].filter(Boolean).sort();
  setSelect.innerHTML = "<option value=''>Toutes les extensions</option>";
  sets.forEach(s => {
    const o = document.createElement("option");
    o.value = s;
    o.textContent = s;
    setSelect.appendChild(o);
  });

  const rarities = [...new Set(allEditions.map(e => e.rarity_name))].filter(Boolean).sort();
  raritySelect.innerHTML = "<option value=''>Toutes raretés</option>";
  rarities.forEach(r => {
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r;
    raritySelect.appendChild(o);
  });
}

function updateProgress() {
  const selectedSet = setSelect.value;

  if (!selectedSet) {
    progressTitle.textContent = "Progression de l’extension";
    progressText.textContent = "Choisis une extension";
    progressFill.style.width = "0%";
    return;
  }

  const setCards = allEditions.filter(e => e.set_name === selectedSet);
  const total = setCards.length;
  const ownedCount = setCards.filter(e => owned[e.printing_uid]).length;
  const percent = total > 0 ? Math.round((ownedCount / total) * 100) : 0;

  progressTitle.textContent = selectedSet;
  progressText.textContent = `${ownedCount} / ${total} cartes possédées • ${percent}% complété`;
  progressFill.style.width = percent + "%";
}

function render() {
  let list = allEditions;

  const search = searchInput.value.toLowerCase().trim();

  if (search) {
    list = list.filter(e => e.name.toLowerCase().includes(search));
  } else if (setSelect.value) {
    list = list.filter(e => e.set_name === setSelect.value);
  }

  if (raritySelect.value) {
    list = list.filter(e => e.rarity_name === raritySelect.value);
  }

  if (ownedSelect.value === "owned") {
    list = list.filter(e => owned[e.printing_uid]);
  }

  if (ownedSelect.value === "missing") {
    list = list.filter(e => !owned[e.printing_uid]);
  }

  cardsDiv.innerHTML = "";

  list.forEach(e => {
    const isOwned = !!owned[e.printing_uid];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${e.image ? `<img src="${e.image}" alt="${e.name}">` : ""}
      <div class="card-body">
        <h3>${e.name}</h3>
        <div>
          <span class="badge">${e.set_name || ""}</span>
          <span class="badge">${e.rarity_name || ""}</span>
          ${e.edition_name ? `<span class="badge">${e.edition_name}</span>` : ""}
        </div>
        <label>
          <input type="checkbox" ${isOwned ? "checked" : ""}>
          Je possède
        </label>
      </div>
    `;

    div.querySelector("input").addEventListener("change", () => {
      owned[e.printing_uid] = !owned[e.printing_uid];
      save();
      render();
      updateProgress();
    });

    cardsDiv.appendChild(div);
  });

  updateProgress();
}

async function init() {
  const res = await fetch("cards.json");
  rawData = await res.json();
  allEditions = flatten(rawData);
  populateFilters();
  render();
}

searchInput.addEventListener("input", render);
setSelect.addEventListener("change", render);
raritySelect.addEventListener("change", render);
ownedSelect.addEventListener("change", render);

init();
</script>

</body>
</html>
